<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Patchwork complete flow</title>
  <desc id="desc">End-to-end flow from developer request through planning, routing, patch generation, review, Git validation, application, status update, and observability.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}.note{font:500 17px Inter,Segoe UI,sans-serif;fill:#475569}
      .box{rx:10;stroke-width:2}.user{fill:#e8f4ff;stroke:#2563eb}.patchwork{fill:#fff7ed;stroke:#ea580c}.agent{fill:#f0fdf4;stroke:#16a34a}.gate{fill:#fef2f2;stroke:#dc2626}.artifact{fill:#fff;stroke:#64748b}
      .label{font:700 19px Inter,Segoe UI,sans-serif;fill:#0f172a}.small{font:600 14px Inter,Segoe UI,sans-serif;fill:#475569}.edge{fill:none;stroke:#64748b;stroke-width:2.5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <text class="title" x="60" y="70">Patchwork Complete Flow</text>
  <text class="note" x="60" y="104">A feature request becomes reviewed, validated patches with traceable execution state.</text>

  <rect class="box user" x="60" y="170" width="210" height="84"/>
  <text class="label" x="90" y="205">Developer request</text>
  <text class="small" x="90" y="232">Feature or bug fix</text>

  <rect class="box patchwork" x="340" y="170" width="210" height="84"/>
  <text class="label" x="375" y="205">patchwork plan</text>
  <text class="small" x="375" y="232">Start orchestration</text>

  <rect class="box agent" x="620" y="170" width="230" height="84"/>
  <text class="label" x="650" y="205">Claude planner</text>
  <text class="small" x="650" y="232">Break into 3-7 tasks</text>

  <rect class="box artifact" x="920" y="170" width="250" height="84"/>
  <text class="label" x="950" y="205">Plan JSON</text>
  <text class="small" x="950" y="232">Saved in .patchwork/plans</text>

  <rect class="box patchwork" x="920" y="330" width="250" height="84"/>
  <text class="label" x="955" y="365">patchwork exec</text>
  <text class="small" x="955" y="392">Run each planned task</text>

  <rect class="box patchwork" x="620" y="330" width="230" height="84"/>
  <text class="label" x="650" y="365">Keyword router</text>
  <text class="small" x="650" y="392">Choose best backend</text>

  <rect class="box agent" x="220" y="300" width="220" height="70"/>
  <text class="label" x="270" y="342">Gemini</text>
  <text class="small" x="270" y="361">Frontend tasks</text>

  <rect class="box agent" x="220" y="390" width="220" height="70"/>
  <text class="label" x="275" y="432">Codex</text>
  <text class="small" x="275" y="451">Backend tasks</text>

  <rect class="box agent" x="220" y="480" width="220" height="70"/>
  <text class="label" x="270" y="522">Claude</text>
  <text class="small" x="270" y="541">General tasks</text>

  <rect class="box artifact" x="540" y="500" width="230" height="84"/>
  <text class="label" x="575" y="535">Unified diff</text>
  <text class="small" x="575" y="562">Patch candidate</text>

  <rect class="box gate" x="840" y="500" width="230" height="84"/>
  <text class="label" x="875" y="535">Claude review</text>
  <text class="small" x="875" y="562">Approve or reject</text>

  <rect class="box gate" x="1140" y="500" width="210" height="84"/>
  <text class="label" x="1170" y="535">Git validation</text>
  <text class="small" x="1170" y="562">git apply --check</text>

  <rect class="box patchwork" x="920" y="660" width="210" height="84"/>
  <text class="label" x="955" y="695">Apply patch</text>
  <text class="small" x="955" y="722">Approved changes</text>

  <rect class="box artifact" x="620" y="660" width="230" height="84"/>
  <text class="label" x="655" y="695">Update status</text>
  <text class="small" x="655" y="722">Plan records outcome</text>

  <rect class="box artifact" x="340" y="660" width="210" height="84"/>
  <text class="label" x="370" y="695">Langfuse trace</text>
  <text class="small" x="370" y="722">Optional observability</text>

  <path class="edge" d="M270 212 H340"/>
  <path class="edge" d="M550 212 H620"/>
  <path class="edge" d="M850 212 H920"/>
  <path class="edge" d="M1045 254 V330"/>
  <path class="edge" d="M920 372 H850"/>
  <path class="edge" d="M620 372 C540 342 500 335 440 335"/>
  <path class="edge" d="M620 372 C540 390 510 425 440 425"/>
  <path class="edge" d="M620 372 C540 460 510 515 440 515"/>
  <path class="edge" d="M440 335 C500 360 520 470 540 520"/>
  <path class="edge" d="M440 425 C500 425 520 500 540 530"/>
  <path class="edge" d="M440 515 H540"/>
  <path class="edge" d="M770 542 H840"/>
  <path class="edge" d="M1070 542 H1140"/>
  <path class="edge" d="M1245 584 C1245 675 1180 702 1130 702"/>
  <path class="edge" d="M920 702 H850"/>
  <path class="edge" d="M620 702 H550"/>
</svg>
