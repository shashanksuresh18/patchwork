<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-labelledby="title desc">
  <title id="title">Patchwork agent responsibilities</title>
  <desc id="desc">Responsibilities split between Patchwork, Claude, Codex, Gemini, and guardrails.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}.note{font:500 17px Inter,Segoe UI,sans-serif;fill:#475569}
      .lane{rx:14;fill:#fff;stroke:#d8dee8;stroke-width:2}.laneTitle{font:800 22px Inter,Segoe UI,sans-serif;fill:#0f172a}.box{rx:10;stroke-width:2}
      .patchwork{fill:#fff7ed;stroke:#ea580c}.claude{fill:#f5f3ff;stroke:#7c3aed}.codex{fill:#ecfeff;stroke:#0891b2}.gemini{fill:#f0fdf4;stroke:#16a34a}.guard{fill:#fef2f2;stroke:#dc2626}.user{fill:#e8f4ff;stroke:#2563eb}
      .label{font:700 18px Inter,Segoe UI,sans-serif;fill:#0f172a}.small{font:600 14px Inter,Segoe UI,sans-serif;fill:#475569}.edge{fill:none;stroke:#64748b;stroke-width:2.5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1400" height="800"/>
  <text class="title" x="60" y="70">Agent Responsibilities</text>
  <text class="note" x="60" y="104">Patchwork coordinates the system; agents generate patches; guardrails decide what reaches the repo.</text>

  <rect class="box user" x="60" y="170" width="220" height="82"/><text class="label" x="122" y="205">Developer</text><text class="small" x="98" y="232">Provides the feature request</text>
  <rect class="box patchwork" x="360" y="170" width="260" height="82"/><text class="label" x="446" y="205">Patchwork</text><text class="small" x="400" y="232">Owns orchestration and state</text>

  <rect class="lane" x="70" y="320" width="360" height="360"/><text class="laneTitle" x="110" y="365">Patchwork owns</text>
  <rect class="box patchwork" x="110" y="400" width="280" height="56"/><text class="label" x="146" y="435">Create and save plans</text>
  <rect class="box patchwork" x="110" y="480" width="280" height="56"/><text class="label" x="176" y="515">Route tasks</text>
  <rect class="box patchwork" x="110" y="560" width="280" height="56"/><text class="label" x="164" y="595">Persist task status</text>

  <rect class="lane" x="520" y="320" width="360" height="360"/><text class="laneTitle" x="560" y="365">Assistants own</text>
  <rect class="box claude" x="560" y="400" width="280" height="56"/><text class="label" x="590" y="435">Claude: plan and review</text>
  <rect class="box codex" x="560" y="480" width="280" height="56"/><text class="label" x="596" y="515">Codex: backend patches</text>
  <rect class="box gemini" x="560" y="560" width="280" height="56"/><text class="label" x="596" y="595">Gemini: frontend patches</text>

  <rect class="lane" x="970" y="320" width="360" height="360"/><text class="laneTitle" x="1010" y="365">Guardrails own</text>
  <rect class="box guard" x="1010" y="400" width="280" height="56"/><text class="label" x="1050" y="435">Review generated diffs</text>
  <rect class="box guard" x="1010" y="480" width="280" height="56"/><text class="label" x="1040" y="515">Validate with Git apply</text>
  <rect class="box guard" x="1010" y="560" width="280" height="56"/><text class="label" x="1052" y="595">Reject invalid patches</text>

  <path class="edge" d="M280 211 H360"/>
  <path class="edge" d="M490 252 C440 310 310 340 250 400"/>
  <path class="edge" d="M620 211 C715 255 725 330 700 400"/>
  <path class="edge" d="M840 428 H1010"/>
  <path class="edge" d="M840 508 H1010"/>
  <path class="edge" d="M840 588 H1010"/>
  <path class="edge" d="M390 508 H560"/>
</svg>
