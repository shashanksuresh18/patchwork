<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Patchwork data flow architecture</title>
  <desc id="desc">Settings, repository context, generated patch, review, validation, worktree update, plan status, and optional Langfuse tracing.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#64748b"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px Inter,Segoe UI,sans-serif;fill:#0f172a}.note{font:500 17px Inter,Segoe UI,sans-serif;fill:#475569}
      .box{rx:10;stroke-width:2}.input{fill:#e8f4ff;stroke:#2563eb}.runtime{fill:#fff7ed;stroke:#ea580c}.file{fill:#fff;stroke:#64748b}.external{fill:#f0fdf4;stroke:#16a34a}.guard{fill:#fef2f2;stroke:#dc2626}
      .label{font:700 19px Inter,Segoe UI,sans-serif;fill:#0f172a}.small{font:600 14px Inter,Segoe UI,sans-serif;fill:#475569}.edge{fill:none;stroke:#64748b;stroke-width:2.5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1400" height="820"/>
  <text class="title" x="60" y="70">Data Flow Architecture</text>
  <text class="note" x="60" y="104">Patchwork keeps generated output as diffs, validates them with Git, and records execution state.</text>

  <rect class="box file" x="70" y="170" width="210" height="82"/><text class="label" x="122" y="205">.env settings</text><text class="small" x="117" y="232">mode, commands, keys</text>
  <rect class="box input" x="70" y="300" width="210" height="82"/><text class="label" x="112" y="335">CLI command</text><text class="small" x="115" y="362">plan or exec</text>
  <rect class="box runtime" x="370" y="235" width="230" height="82"/><text class="label" x="426" y="270">Config load</text><text class="small" x="412" y="297">Runtime settings</text>

  <path d="M760 206 L900 276 L760 346 L620 276 Z" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text class="label" x="704" y="268">Mode select</text><text class="small" x="690" y="298">CLI or provider SDK</text>

  <rect class="box external" x="1000" y="170" width="260" height="82"/><text class="label" x="1046" y="205">Local agent CLIs</text><text class="small" x="1051" y="232">claude, codex, gemini</text>
  <rect class="box external" x="1000" y="300" width="260" height="82"/><text class="label" x="1054" y="335">Provider SDKs</text><text class="small" x="1051" y="362">API mode option</text>

  <rect class="box file" x="70" y="500" width="210" height="82"/><text class="label" x="118" y="535">Git context</text><text class="small" x="112" y="562">files and recent log</text>
  <rect class="box file" x="70" y="630" width="210" height="82"/><text class="label" x="100" y="665">graphifyy context</text><text class="small" x="112" y="692">optional knowledge graph</text>
  <rect class="box runtime" x="370" y="565" width="230" height="82"/><text class="label" x="422" y="600">Prompt build</text><text class="small" x="415" y="627">Task plus context</text>

  <rect class="box file" x="700" y="565" width="230" height="82"/><text class="label" x="748" y="600">Unified diff</text><text class="small" x="745" y="627">Patch candidate</text>
  <rect class="box guard" x="1010" y="500" width="230" height="82"/><text class="label" x="1062" y="535">Patch review</text><text class="small" x="1060" y="562">Claude decision</text>
  <rect class="box guard" x="1010" y="630" width="230" height="82"/><text class="label" x="1056" y="665">Git validation</text><text class="small" x="1050" y="692">git apply --check</text>

  <rect class="box file" x="700" y="720" width="230" height="70"/><text class="label" x="748" y="760">Worktree</text>
  <rect class="box file" x="430" y="720" width="210" height="70"/><text class="label" x="474" y="760">Plan status</text>
  <rect class="box external" x="1120" y="720" width="210" height="70"/><text class="label" x="1162" y="760">Langfuse</text>

  <path class="edge" d="M280 211 C330 211 330 276 370 276"/><path class="edge" d="M280 341 C330 341 330 276 370 276"/><path class="edge" d="M600 276 H620"/>
  <path class="edge" d="M900 276 C950 220 965 211 1000 211"/><path class="edge" d="M900 276 C950 330 965 341 1000 341"/>
  <path class="edge" d="M280 541 C330 541 330 606 370 606"/><path class="edge" d="M280 671 C330 671 330 606 370 606"/><path class="edge" d="M600 606 H700"/>
  <path class="edge" d="M1260 211 C1305 330 1120 455 930 585"/><path class="edge" d="M1260 341 C1300 440 1110 530 930 606"/>
  <path class="edge" d="M930 606 C970 575 980 541 1010 541"/><path class="edge" d="M1125 582 V630"/>
  <path class="edge" d="M1010 671 C970 715 930 745 930 755"/><path class="edge" d="M1010 541 C880 705 700 745 640 755"/><path class="edge" d="M1240 671 C1260 700 1265 720 1265 720"/>
</svg>
